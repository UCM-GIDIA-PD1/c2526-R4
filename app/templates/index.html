<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SteamPredictor — Predicción de métricas de juegos</title>
    <meta name="description"
        content="SteamPredictor utiliza Machine Learning para predecir popularidad, precios y sentimiento de reseñas de juegos de Steam.">
    <link rel="icon" href="/static/img/logo.png" type="image/png">
    <link rel="stylesheet" href="/static/css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>

<body>

    <div id="hero-scroll-container">
        <canvas id="hero-canvas"></canvas>
    </div>

    <img src="/static/img/logo.png" id="corner-logo" alt="Logo">

    <div class="bg-base" aria-hidden="true">
        <div class="bg-figures" id="bg-figures"></div>
    </div>
    <div class="bg-vignette" aria-hidden="true"></div>
    <div class="bg-noise" id="bg-noise" aria-hidden="true"></div>

    <div class="app-container">

        <section id="view-home" class="view active">

            <div class="search-container">
                <div class="search-wrapper">
                    <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                    <input type="text" id="search-input" class="search-input" autocomplete="off">
                </div>
                <div id="search-dropdown" class="search-dropdown"></div>
            </div>

            <div id="game-grid" class="game-grid">
                <div class="loading">
                    <div class="spinner"></div>
                </div>
            </div>

        </section>

        <section id="view-game" class="view">
            <button id="btn-back-home" class="back-btn">
                ← Volver
            </button>
            <div id="game-detail-content">
                <div class="loading">
                    <div class="spinner"></div>
                </div>
            </div>
        </section>

        <section id="view-prediction" class="view">
            <button id="btn-back-game" class="back-btn">
                ← Volver al juego
            </button>
            <div id="prediction-detail-content">
                <div class="loading">
                    <div class="spinner"></div>
                </div>
            </div>
        </section>

    </div>

    <script src="/static/js/app.js"></script>

</body>

</html>
